# ── Server ────────────────────────────────────────────────────────────────────
server.port=8081

# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/student_achievements?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── SQL Init (seed data) ──────────────────────────────────────────────────────
# Set to 'always' ONLY on first run to seed data. Then change to 'never'.
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ── CORS ──────────────────────────────────────────────────────────────────────
spring.mvc.cors.allowed-origins=http://localhost:5173

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.studentachievements=DEBUG
